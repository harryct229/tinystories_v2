# Real GRPO run on Colab Pro. bf16 on L4 (preferred); on a T4 fallback set
# precision = "fp16". GRPO optimizes the SFT policy against the frozen Reward
# Model (issue 05) with a KL leash to the frozen SFT reference (ADR-0006).
# Prerequisites on Hub: issue 03's SFT checkpoint, issue 05's gate-passing
# Reward Model, the data repo's pref split, and tokenizer_full. [init]/[reward]
# hub_source pull the SFT + RM artifacts if the local copies are absent (fresh
# VM). Rollout sampling is the cost driver (no KV cache) — raise prompts_per_step
# / max_new_tokens only if the L4 has headroom.
out_dir = "artifacts/grpo_full"

[model]
vocab_size = 8192
d_model = 512
n_layers = 8
n_heads = 8
context = 512
ffn_hidden = 1408

[data]
pref_split = "artifacts/data_prep_full/splits/pref.jsonl"
hub_source = "hf://congthanh991/tinystories-v2-data"
tokenizer_path = "artifacts/tokenizer_full/tokenizer.json"
tokenizer_hub_source = "hf://congthanh991/tinystories-v2-tokenizer"

[init]
local_dir = "artifacts/sft_full"
hub_source = "hf://congthanh991/tinystories-v2-sft"

[reward]
local_dir = "artifacts/reward_full"
hub_source = "hf://congthanh991/tinystories-v2-reward"
gate = 0.68

[grpo]
group_size = 8
clip_eps = 0.2
kl_beta = 0.03
ppo_epochs = 2
adv_eps = 1e-6

[sampling]
# 384 lets real fables finish (SFT completions run ~380 tokens; <|end|>
# early-stops the group) — 256 truncated most rollouts mid-fable, handing the
# RM out-of-distribution text. Measured L4 budget at 8 prompts x G=8 x 384:
# ~20-30 s/step -> ~2-2.5 h for 300 steps.
max_new_tokens = 384
temperature = 1.0
top_p = 0.95

[train]
steps = 300
prompts_per_step = 8
peak_lr = 2e-6
warmup_frac = 0.03
min_lr_frac = 0.1
weight_decay = 0.0
beta1 = 0.9
beta2 = 0.95
grad_clip = 1.0
precision = "bf16"
seed = 1337
checkpoint_every = 10      # aggressive: first Hub sync must land before the
                           # preemption window; a lost session otherwise
                           # restarts from step 0 (happened 2026-07-13)
log_every = 5
keep_last = 2

[wandb]
enabled = true
project = "tinystories-v2"
run_name = "grpo"

[hub]
target = "hf://congthanh991/tinystories-v2-grpo"
